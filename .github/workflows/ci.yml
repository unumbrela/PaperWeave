name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint 已是硬门禁：核心链路 0 error；vendored 可视化代码（transformer /
      # gan / diffusion explainer + ganlab）在 eslint.config.mjs 的 ignores 内，
      # 不阻塞 CI（其 any/require 历史债务后续在独立 showcase 仓清偿）。
      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # CI 构建用占位值，避免缺少环境变量导致失败；真实部署在 Vercel 配置
          DEEPSEEK_API_KEY: ci-placeholder

  # E2E 独立 job：浏览器级 happy-path（检索 → 入库 → 论文库），
  # 检索接口被 page.route 拦截注入 fixture，不依赖外部网络。
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e
        env:
          DEEPSEEK_API_KEY: ci-placeholder
