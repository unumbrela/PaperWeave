name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      # Lint 历史债务集中在 vendored 可视化代码（约 68 error，多为 no-explicit-any）；
      # 核心工作流代码已 0 error。暂设为非阻塞，逐步清偿（见 PROJECT-SUMMARY.md §五）；
      # 类型与构建是硬门禁。
      - name: Lint (non-blocking)
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          # CI 构建用占位值，避免缺少环境变量导致失败；真实部署在 Vercel 配置
          DEEPSEEK_API_KEY: ci-placeholder
